# =============================================================================
# The Daily Grind — Coffee Shop Management System
# GitHub Actions CI/CD Pipeline
# Triggers on every push to the `main` branch.
# Stages: Install → Type-Check → Build → Deploy (Vercel)
# =============================================================================

name: CI / Build & Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Quality Gate — Type-check, then build
  # ---------------------------------------------------------------------------
  build:
    name: 🔍 Type-Check & Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      # ── 1. Checkout source code ─────────────────────────────────────────────
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node.js using the matrix version ──────────────────────────
      - name: 🟢 Set up Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      # ── 3. Install dependencies using exact lockfile ────────────────────────
      - name: 📦 Install dependencies (npm ci)
        run: npm ci

      # ── 4. Strict TypeScript type-checking (tsc --noEmit) ───────────────────
      #       Configured via tsconfig.json → "noEmit": true
      #       Runs via package.json lint script: `tsc --noEmit`
      - name: ✅ Run TypeScript type-check (tsc --noEmit)
        run: npm run lint

      # ── 5. Optimized production build ───────────────────────────────────────
      #       Runs: vite build && esbuild server.ts → dist/server.cjs
      - name: 🏗️  Build production bundle
        run: npm run build
        env:
          NODE_ENV: production

      # ── 6. Upload dist artifact for the deploy job ──────────────────────────
      - name: 📤 Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-dist
          path: dist/
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Job 2: Deploy to Vercel (main branch only — not on PRs)
  # ---------------------------------------------------------------------------
  deploy:
    name: 🚀 Deploy to Vercel
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: ⬇️  Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Install dependencies (npm ci)
        run: npm ci

      - name: 🚀 Deploy to Vercel via CLI
        id: deploy
        run: |
          npm install -g vercel@latest
          DEPLOY_URL=$(vercel --prod --yes \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }})
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $DEPLOY_URL"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NODE_ENV: production
